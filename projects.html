{% assign projects = site.projects | sort: date | reverse %}
{% for project in projects limit:5 %}
	{% if project.status == 'published' %}
		<div class="proj-item">
		<a href="{{ project.url | prepend: site.baseurl }}">{{ project.title }} → </a><br>
			<p>{{ project.description }} </p>
			<img class="thumb" src="{{ project.image | prepend: site.baseurl }}"/>
		</div>
	{% endif %}
{% endfor %}
